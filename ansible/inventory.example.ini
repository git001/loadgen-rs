# loadgen-rs distributed worker inventory
#
# Copy this file to inventory.ini and adjust to your environment.
#
# Each host in [workers] will run one worker-agent.
# The controller runs on the local machine and connects to all workers.

[workers]
# worker1  ansible_host=10.0.0.11  worker_port=9091
# worker2  ansible_host=10.0.0.12  worker_port=9091
# worker3  ansible_host=10.0.0.13  worker_port=9091

# Example: 3 workers on the same machine (different ports)
# localhost-w1  ansible_host=127.0.0.1  ansible_connection=local  worker_port=9091
# localhost-w2  ansible_host=127.0.0.1  ansible_connection=local  worker_port=9092
# localhost-w3  ansible_host=127.0.0.1  ansible_connection=local  worker_port=9093

[workers:vars]
# SSH user for remote machines
ansible_user=alex

# Where to deploy loadgen files on the remote machine
deploy_dir=/opt/loadgen

# Worker-agent listen address (0.0.0.0 = all interfaces)
worker_listen=0.0.0.0

# Default port (can be overridden per host with worker_port)
worker_port=9091

# Deno binary path on remote machines
deno_bin=deno

# Deno version to install if not present
deno_version=2.7.1
